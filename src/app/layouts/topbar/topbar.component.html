<header
	class="relative z-50 border-b border-[var(--c-border)] bg-[var(--c-bg-secondary)]/95 backdrop-blur supports-[backdrop-filter]:bg-[var(--c-bg-secondary)]/80"
>
	<div
		class="mx-auto flex min-h-16 w-full max-w-[var(--container)] items-center justify-between gap-3 px-4 py-3 sm:px-6"
	>
		<a
			aria-label="Go to homepage"
			class="inline-flex items-center gap-3"
			routerLink="/"
		>
			<img
				class="h-10 w-auto"
				alt="Project logo"
				ngSrc="logo.png"
				width="132"
				height="40"
				priority
			/>
			<span class="hidden text-sm font-semibold tracking-[0.16em] text-[var(--c-text-strong)] sm:inline">
				Design Catalog
			</span>
		</a>

		<nav class="flex items-center gap-2" aria-label="Design catalog navigation">
			<a
				class="theme-interactive theme-focus relative inline-flex size-11 items-center justify-center rounded-full border border-[var(--c-border)] bg-[var(--c-bg-primary)] text-sm font-medium text-[var(--c-text-strong)] shadow-[var(--shadow-sm)] hover:border-[var(--c-primary)] hover:text-[var(--c-primary)]"
				routerLink="/cart"
				aria-label="Open AI prompt cart"
				title="AI prompt cart"
			>
				<span
					class="material-symbols-outlined text-[20px] text-[var(--c-primary)]"
					aria-hidden="true"
				>
					shopping_cart
				</span>
				@if (cartCount() > 0) {
					<span
						class="topbar-cart-counter absolute -right-1 -top-1 inline-flex min-w-5 items-center justify-center rounded-full bg-[var(--c-primary)] px-1.5 text-xs font-bold leading-5"
						aria-label="Selected designs"
					>
						{{ cartCount() }}
					</span>
				}
			</a>

			<button
				class="theme-interactive theme-focus inline-flex size-11 items-center justify-center rounded-full border border-[var(--c-border)] bg-[var(--c-bg-primary)] text-sm font-medium text-[var(--c-text-strong)] shadow-[var(--shadow-sm)] hover:border-[var(--c-primary)] hover:text-[var(--c-primary)]"
				type="button"
				(click)="toggleMode()"
				[attr.aria-label]="'Switch to ' + (activeMode() === 'light' ? 'dark' : 'light') + ' theme designs'"
				[title]="'Current mode: ' + modeLabel()"
			>
				<span
					class="material-symbols-outlined text-[20px] text-[var(--c-primary)]"
					aria-hidden="true"
				>
					{{ activeMode() === 'light' ? 'light_mode' : 'dark_mode' }}
				</span>
			</button>

			<a
				class="theme-interactive theme-focus group inline-flex items-center gap-2 rounded-full border border-[var(--c-border)] bg-[var(--c-bg-primary)] px-3 py-2 text-sm font-medium text-[var(--c-text-strong)] shadow-[var(--shadow-sm)] hover:border-[var(--c-primary)] hover:text-[var(--c-primary)]"
				[routerLink]="nextDesign().path"
				[attr.aria-label]="'Next design: ' + nextDesign().label"
				[title]="'Next: ' + nextDesign().label"
			>
				<span
					class="material-symbols-outlined text-[20px] text-[var(--c-primary)]"
					aria-hidden="true"
				>
					{{ nextDesign().icon }}
				</span>
				<span class="max-w-[10rem] truncate sm:max-w-[14rem]">
					{{ nextDesign().label }}
				</span>
				<span
					class="hidden text-xs font-normal tracking-wide text-[var(--c-text-muted)] sm:inline"
				>
					{{ position() }}
				</span>
				<span
					class="material-symbols-outlined text-[18px] text-[var(--c-text-muted)] transition-transform group-hover:translate-x-0.5 group-hover:text-[var(--c-primary)]"
					aria-hidden="true"
				>
					chevron_right
				</span>
			</a>
		</nav>
	</div>
</header>
