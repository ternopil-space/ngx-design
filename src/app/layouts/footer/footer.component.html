<footer class="border-t border-[var(--c-border)] bg-[var(--c-bg-secondary)]">
	<div class="mx-auto grid max-w-[var(--container)] gap-10 px-4 py-10 sm:px-6 lg:grid-cols-[minmax(0,1.4fr)_minmax(14rem,0.8fr)] lg:gap-16">
		<div class="grid gap-5 sm:grid-cols-[7rem_minmax(0,1fr)] sm:items-start">
			<div
				class="overflow-hidden rounded-[calc(var(--radius-card)*1.8)] border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-3 shadow-[var(--shadow-sm)]"
			>
				<img
					class="h-auto w-full rounded-[calc(var(--radius-card)*1.1)] object-cover"
					ngSrc="logo.png"
					[attr.alt]="catalog.name + ' logo'"
					width="132"
					height="40"
					loading="lazy"
				/>
			</div>

			<div>
				<p class="text-sm font-semibold uppercase tracking-[0.2em] text-[var(--c-text-muted)]">
					About catalog
				</p>
				<p class="mt-3 text-xl font-semibold text-[var(--c-text-strong)]">
					{{ catalog.name }}
				</p>
				<p class="mt-3 max-w-2xl text-sm leading-7 text-[var(--c-text)]">
					{{ catalog.description }}
				</p>
			</div>
		</div>

		<div class="flex flex-col gap-4">
			<p class="text-sm font-semibold uppercase tracking-[0.2em] text-[var(--c-text-muted)]">
				Pages
			</p>
			<nav aria-label="Pages footer navigation">
				<ul class="grid gap-x-8 gap-y-3 sm:grid-cols-2">
					@for (page of pageLinks(); track page.path) {
						<li>
							<a
								class="theme-focus inline-flex items-center gap-2 rounded-md text-base font-medium text-[var(--c-text-strong)] transition-colors duration-150 hover:text-[var(--c-primary)]"
								[routerLink]="page.path"
							>
								<span class="material-symbols-outlined text-[20px]" aria-hidden="true">
									{{ page.icon }}
								</span>
								<span>{{ page.label }}</span>
							</a>
						</li>
					}
				</ul>
			</nav>
		</div>
	</div>

	<div class="border-t border-[var(--c-border)]">
		<div class="mx-auto flex max-w-[var(--container)] px-4 py-4 text-sm text-[var(--c-text-muted)] sm:px-6">
			<p>
				&copy; {{ currentYear }} {{ catalog.name }}.
				<span>All rights reserved.</span>
			</p>
		</div>
	</div>
</footer>
