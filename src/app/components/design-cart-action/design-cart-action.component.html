@if (isVisible()) {
	<div class="design-cart-action">
		<button
			class="design-cart-action__button theme-interactive theme-focus inline-flex items-center justify-center gap-2 rounded-full bg-[var(--c-primary)] px-5 py-3 text-sm font-semibold shadow-[var(--shadow-md)] hover:opacity-90"
			type="button"
			(click)="addToCart()"
			[attr.aria-label]="'Add ' + currentDesign()?.label + ' to AI prompt cart'"
		>
			<span class="material-symbols-outlined text-[20px]" aria-hidden="true">
				{{ isSelected() ? 'shopping_cart_checkout' : 'add_shopping_cart' }}
			</span>
			{{ buttonLabel() }}
		</button>
	</div>
}
